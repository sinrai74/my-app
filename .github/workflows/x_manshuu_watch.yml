name: 万舟警報 監視（イベント駆動）

on:
  schedule:
    # 競艇開催時間帯（JST 9:00〜21:00）を1分ごとに監視
    # GitHub Actionsの最小間隔は5分なので5分ごとに設定
    - cron: '*/5 0-12 * * *'    # UTC 0:00〜12:00 = JST 9:00〜21:00
  workflow_dispatch:
    inputs:
      threshold:
        description: '万舟指数の閾値（デフォルト: 65）'
        required: false
        default: '65'
      minutes:
        description: '締切までの分数（デフォルト: 45）'
        required: false
        default: '45'
      dry_run:
        description: 'ドライラン (true=送信しない)'
        required: false
        default: 'false'

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 "scikit-learn==1.5.2" pandas numpy

      - name: Run manshuu watch
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          THRESHOLD="${{ github.event.inputs.threshold }}"
          MINUTES="${{ github.event.inputs.minutes }}"
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_manshuu_watch.py \
            --threshold ${THRESHOLD:-65} \
            --minutes ${MINUTES:-45} \
            $DRY

      # 送信済みフラグを保存
      - name: Commit sent flags
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manshuu_sent.json || true
          git diff --cached --quiet || git commit -m "auto: manshuu_sent $(date +%Y%m%d-%H%M)"
          git push origin main || echo "⚠️ push失敗（競合）"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
