name: ボートレース荒れ検知 (15分ごと)

on:
  # ── 15分ごとの自動実行（UTC: 日本時間 -9h）──────────────────
  # 日本の開催時間帯（JST 8:00〜22:00）に絞る
  # UTC 23:00 〜 13:00 = JST 8:00 〜 22:00
  schedule:
    - cron: "0,15,30,45 23 * * *"
    - cron: "0,10,20,30,40,50 0-4 * * *"
    - cron: "0,15,30,45 5-12 * * *"
    - cron: "0 13 * * *"

  # ── 手動実行（デバッグ用）──────────────────────────────────
  workflow_dispatch:
    inputs:
      race_date:
        description: "対象日付 YYYYMMDD（空欄で今日）"
        required: false
        default: ""
      threshold:
        description: "荒れスコア閾値（デフォルト: 3.0）"
        required: false
        default: "4.0"
      skip_filter:
        description: "締切チェック無効化 (1=無効)"
        required: false
        default: "0"

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # 10分でタイムアウト（次の15分起動に干渉しないよう）

    steps:
      # ── リポジトリを取得 ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # ── Python セットアップ ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 依存ライブラリのインストール ─────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas numpy scikit-learn lightgbm

      # ── 荒れ検知スクリプト実行 ──────────────────────────────
      - name: Run upset detector
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SKIP_TIME_FILTER: ${{ github.event.inputs.skip_filter }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_ARG=""
          THRESHOLD_ARG=""

          # 手動実行時は入力値を使用
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.race_date }}" ]; then
              DATE_ARG="--date ${{ github.event.inputs.race_date }}"
            fi
            if [ -n "${{ github.event.inputs.threshold }}" ]; then
              THRESHOLD_ARG="--threshold ${{ github.event.inputs.threshold }}"
            fi
          fi

          python notify_arashi.py $DATE_ARG $THRESHOLD_ARG

      # ── 生成データをリポジトリへ保存（コミット）────────────
      # 【バグ修正】このステップ自体が丸ごと存在しなかった。
      # GitHub Actionsのコンテナは実行ごとに使い捨てのため、
      # notify_arashi.py が生成・更新した hit_record.csv や
      # buyscore_log.jsonl（今日の実際の買い目ログ）が、
      # commitされないままコンテナ終了と同時に毎回消えていた。
      # 15分ごとに実行される都合上、pushの競合が起きやすいので
      # git pull --rebase を挟んでからpushする。
      - name: Commit data files
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hit_record.csv 2>/dev/null || true
          git add sent_*.txt 2>/dev/null || true
          [ -f motor_history.csv ]      && git add motor_history.csv      || true
          [ -f buyscore_log.jsonl ]     && git add buyscore_log.jsonl     || true
          [ -f buyscore_config.json ]   && git add buyscore_config.json   || true
          [ -f buyscore_analysis.json ] && git add buyscore_analysis.json || true
          [ -f daily_stats.json ]       && git add daily_stats.json       || true
          git diff --cached --quiet || git commit -m "auto: notify_arashi update $(date -u +%Y%m%d-%H%M)"
          git pull --rebase origin main || true
          git push origin main || echo "push失敗（競合の可能性、次回再試行）"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 失敗時のログ保存（デバッグ用）──────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
