name: X Ranking Post

'on':
  schedule:
    - cron: '15 19 * * *'
    - cron: '0 23 * * *'
    - cron: '0 4 * * *'
    - cron: '0 11 * * *'
    - cron: '0 11 * * 0'
  workflow_dispatch:
    inputs:
      post_type:
        description: '投稿種類 (danger / hot / awakening / verification / all)'
        required: false
        default: 'all'
      date:
        description: '対象日 YYYYMMDD（省略時は今日）'
        required: false
        default: ''
      dry_run:
        description: 'ドライラン (true=送信しない)'
        required: false
        default: 'false'
      with_image:
        description: '画像添付 (true/false)'
        required: false
        default: 'true'
      save_data:
        description: '生成結果を保存(commit)する (true/false)。手動確認時はfalseにすると本番データを上書きしない'
        required: false
        default: 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null 2>&1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 Pillow scikit-learn pandas numpy

      - name: Check model file
        run: |
          [ -f model_all.pkl ] && echo "model_all.pkl あり" || echo "model_all.pkl なし"

      # ── 投稿種類の判定（cron から直接判定）──────────────
      # 時刻判定はせず、github.event.schedule の値で判定する。
      # GitHub Actionsの遅延で時刻がずれても正しく動作する。
      - name: Determine post type
        id: post_type
        run: |
          INPUT="${{ github.event.inputs.post_type }}"
          SCHEDULE="${{ github.event.schedule }}"
          if [ -n "$INPUT" ] && [ "$INPUT" != "all" ]; then
            TYPE="$INPUT"
          elif [ "$SCHEDULE" = "15 21 * * *" ]; then
            TYPE="danger"
          elif [ "$SCHEDULE" = "0 1 * * *" ]; then
            TYPE="hot"
          elif [ "$SCHEDULE" = "0 6 * * *" ]; then
            TYPE="awakening"
          elif [ "$SCHEDULE" = "0 12 * * *" ]; then
            TYPE="verification"
          elif [ -n "$SCHEDULE" ]; then
            TYPE="danger"
          else
            TYPE="all"
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "schedule=$SCHEDULE"
          echo "投稿種類: $TYPE"

      # ── 前日モーター履歴を蓄積 ──────────────────────────
      # 【朝版ポリシー】ランキング生成は朝(danger)の1回のみ。
      # 激走・覚醒の送信タイミング(hot/awakening)では再生成しない
      # （展示情報等の後追い反映によるデータ書き換えを防ぐため）。
      - name: Update motor history
        if: steps.post_type.outputs.type == 'danger' || steps.post_type.outputs.type == 'all'
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            PREV=$(python3 -c "from datetime import datetime,timedelta; d='${{ github.event.inputs.date }}'; print((datetime.strptime(d,'%Y%m%d')-timedelta(days=1)).strftime('%Y%m%d'))")
            DATE_ARG="--date $PREV"
          fi
          python x_ranking.py --update-history $DATE_ARG || echo "履歴更新失敗（続行）"

      # ── ランキング生成（朝版：1日1回のみ生成し、以後は固定）──────
      # 【朝版ポリシー】新聞・危険艇・万舟・転がし・激走・覚醒は
      # 毎朝のデータ取得後に一度だけ生成し、当日中は再計算・書き換えを行わない。
      # 展示ST・展示タイムはリアルタイム反映せず、翌日以降の学習用データとしてのみ使う。
      # cronを前倒ししているため、当日の出走表がBoatraceOpenAPI側に
      # まだ反映されていない場合がある。生成結果の date と実際のレース
      # 件数を確認し、不一致・空データなら最大2回、10分間隔でリトライする。
      - name: Generate rankings
        if: steps.post_type.outputs.type == 'danger' || steps.post_type.outputs.type == 'all'
        run: |
          EXPECTED_DATE="${{ github.event.inputs.date }}"
          if [ -z "$EXPECTED_DATE" ]; then
            EXPECTED_DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          fi

          cat > _check_ranking_date.py << 'CHECKEOF'
          import json, sys
          expected = sys.argv[1]
          try:
              d = json.load(open("ranking_cache.json", encoding="utf-8"))
              date_ok = d.get("date") == expected
              total = (len(d.get("all_danger", d.get("danger_boat1", [])))
                       + len(d.get("all_manshuu", d.get("manshuu_alert", []))))
              print("OK" if (date_ok and total > 0) else "RETRY")
          except Exception:
              print("RETRY")
          CHECKEOF

          MAX_RETRY=2
          RETRY_WAIT=600
          for i in $(seq 1 $MAX_RETRY); do
            python x_ranking.py --generate --date "$EXPECTED_DATE"
            CHECK=$(python3 _check_ranking_date.py "$EXPECTED_DATE")

            if [ "$CHECK" = "OK" ]; then
              echo "[検証] ranking_cache.json は $EXPECTED_DATE のデータとして正常"
              break
            fi

            if [ "$i" -lt "$MAX_RETRY" ]; then
              echo "[警告] 期待日付($EXPECTED_DATE)のデータ未反映 or 空。${RETRY_WAIT}秒後にリトライ ($i/$MAX_RETRY)"
              sleep $RETRY_WAIT
            else
              echo "[警告] リトライ上限到達。取得できたデータのまま続行します（開催なしの可能性）"
            fi
          done

          rm -f _check_ranking_date.py

      # ── 画像生成（朝版：ranking_cache.json と同時に1回だけ生成）───
      - name: Generate images
        if: (steps.post_type.outputs.type == 'danger' || steps.post_type.outputs.type == 'all') && github.event.inputs.with_image != 'false'
        run: |
          python x_image.py --all --input ranking_cache.json || echo "画像生成失敗（テキストのみ）"

      # ── 危険な1号艇を送信（07:00）─────────────────────
      - name: Send - Danger Boat1
        if: steps.post_type.outputs.type == 'danger' || steps.post_type.outputs.type == 'all'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          IMG=""
          [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f danger.png ] && IMG="--with-image"
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_post.py --type danger $IMG $DRY

      # ── 激走モーターを送信（11:00）────────────────────
      - name: Send - Hot Motor
        if: steps.post_type.outputs.type == 'hot' || steps.post_type.outputs.type == 'all'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          IMG=""
          [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f hot_motor.png ] && IMG="--with-image"
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_post.py --type hot $IMG $DRY

      # ── 万舟警報を送信（朝の危険艇と同時に送信）──
      - name: Send - Manshuu Alert
        if: steps.post_type.outputs.type == 'danger' || steps.post_type.outputs.type == 'all'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          IMG=""
          [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f manshuu_1.png ] && IMG="--with-image"
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_post.py --type manshuu $IMG $DRY

      # ── 覚醒モーターを送信（16:00/覚醒度90以上のみ）──
      - name: Send - Awakening Motor
        if: steps.post_type.outputs.type == 'awakening' || steps.post_type.outputs.type == 'all'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          HAS=$(python3 -c "import json; d=json.load(open('ranking_cache.json')); print('yes' if any(m.get('score',0)>=90 for m in d.get('awakening_motor',[])) else 'no')" 2>/dev/null || echo "no")
          if [ "$HAS" = "no" ]; then
            echo "覚醒度90以上なし → 本日はスキップ"
            exit 0
          fi
          echo "覚醒度90以上あり → 送信"
          IMG=""
          [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f awakening.png ] && IMG="--with-image"
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_post.py --type awakening $IMG $DRY

      # ── 検証結果を送信（21:00）────────────────────────
      - name: Send - Verification
        if: steps.post_type.outputs.type == 'verification' || steps.post_type.outputs.type == 'all'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          DATE_ARG=""
          [ -n "${{ github.event.inputs.date }}" ] && DATE_ARG="--date ${{ github.event.inputs.date }}"
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_verification.py $DATE_ARG $DRY || echo "検証スクリプト失敗（スキップ）"
          python x_buyscore_tuner.py || echo "BuyScoreチューニング失敗（スキップ）"

      # ── AI実績ページ生成・送信（朝の危険艇と同時）────
      # 前日の実績を朝にまとめて確認できるよう、danger送信と同タイミングで実行する
      - name: Send - Results Page
        if: steps.post_type.outputs.type == 'danger' || steps.post_type.outputs.type == 'all'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          DATE_ARG=""
          [ -n "${{ github.event.inputs.date }}" ] && DATE_ARG="--date ${{ github.event.inputs.date }}"
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_results_page.py $DATE_ARG $DRY || echo "実績ページ失敗（スキップ）"

      # ── noteレポート生成・送信（07:30 = danger直後）──
      - name: Send Note Report
        if: steps.post_type.outputs.type == 'danger' || steps.post_type.outputs.type == 'all'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          pip install weasyprint -q 2>/dev/null || true
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_note_report.py $DRY || echo "noteレポート失敗（続行）"

      # ── 週次レポート（日曜のみ）─────────────────────────
      - name: Send Weekly Report
        if: github.event.schedule == '0 12 * * 0' || github.event.inputs.post_type == 'weekly'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          DRY=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY="--dry-run"
          python x_weekly_report.py $DRY || echo "週次レポート失敗（続行）"

      # ── motor_history.csv を保存 ──────────────────────
      # 【手動確認用】workflow_dispatch で save_data=false を指定すると、
      # 生成・送信は行うが git commit/push はスキップする（本番データを上書きしない）。
      # 通常のスケジュール実行(cron)では常に保存する。
      - name: Commit motor history
        if: always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.save_data != 'false')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add motor_history.csv ranking_cache.json 2>/dev/null || true
          [ -f manshuu_sent.json ]       && git add manshuu_sent.json       || true
          [ -f buyscore_log.jsonl ]      && git add buyscore_log.jsonl      || true
          [ -f buyscore_analysis.json ]  && git add buyscore_analysis.json  || true
          [ -f buyscore_config.json ]    && git add buyscore_config.json    || true
          [ -f daily_stats.json ]        && git add daily_stats.json        || true
          git diff --cached --quiet || git commit -m "auto: update history $(date +%Y%m%d-%H%M)"
          git push origin main || echo "push失敗"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip commit (manual dry check)
        if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.save_data == 'false'
        run: |
          echo "save_data=false のため、生成結果は保存(commit)しませんでした。"
          echo "ranking_cache.json 等はこのジョブの実行環境内でのみ変更され、リポジトリには反映されていません。"
