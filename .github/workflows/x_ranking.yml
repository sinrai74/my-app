name: X Ranking Post

on:
  schedule:
    # ─────────────────────────────────────────
    # 投稿スケジュール（UTC → JST +9h）
    #   UTC 23:00 = JST 08:00  → 危険な1号艇TOP10
    #   UTC 23:30 = JST 08:30  → AI万舟警報
    #   UTC 03:00 = JST 12:00  → 激走モーターTOP10
    #   UTC 12:00 = JST 21:00  → 覚醒モーターTOP10
    # ─────────────────────────────────────────
    - cron: '0 23 * * *'    # JST 08:00 (危険1号艇 + 万舟警報 + 激走/覚醒 一括)
  workflow_dispatch:        # 手動実行
    inputs:
      date:
        description: '対象日 YYYYMMDD（省略時は今日）'
        required: false
        default: ''
      dry_run:
        description: 'ドライラン（true=投稿しない）'
        required: false
        default: 'false'
      with_image:
        description: '画像付き投稿（true/false）'
        required: false
        default: 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── リポジトリ取得 ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python セットアップ ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # 3.14 は runners 未対応のため 3.12 を使用

      # ── 日本語フォントインストール（画像生成用）──────────
      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null 2>&1

      # ── 依存パッケージインストール ──────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 tweepy Pillow scikit-learn pandas numpy

      # ── モデルファイル確認 ──────────────────────────────
      - name: Check model file
        run: |
          if [ -f model_all.pkl ]; then
            echo "✅ model_all.pkl が存在します"
          else
            echo "⚠️  model_all.pkl が見つかりません（MLスコアなし）"
          fi

      # ── 前日のモーター履歴を蓄積 ────────────────────────
      - name: Update motor history (yesterday)
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            # 手動実行時は指定日の前日を計算
            PREV_DATE=$(python3 -c 'from datetime import datetime, timedelta; d="${{ github.event.inputs.date }}"; print((datetime.strptime(d, "%Y%m%d") - timedelta(days=1)).strftime("%Y%m%d"))')
            DATE_ARG="--date $PREV_DATE"
          fi
          python x_ranking.py --update-history $DATE_ARG || echo "⚠️ 履歴更新失敗（続行）"

      # ── ランキング生成 ────────────────────────────────────
      - name: Generate rankings
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python x_ranking.py --generate $DATE_ARG --split

      # ── 画像生成 ──────────────────────────────────────────
      - name: Generate images
        if: ${{ github.event.inputs.with_image != 'false' }}
        run: |
          python x_image.py --all --input ranking_cache.json || echo "⚠️ 画像生成失敗（テキストのみ投稿）"

      # ── 危険な1号艇 投稿（08:00）────────────────────────
      - name: Post - Danger Boat1
        env:
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          IMAGE_FLAG=""
          if [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f danger.png ]; then
            IMAGE_FLAG="--with-image"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python x_post.py --type danger $IMAGE_FLAG $DRY_FLAG

      # ── 30秒待機 ────────────────────────────────────────
      - name: Wait between posts
        run: sleep 30

      # ── AI万舟警報 投稿（08:30相当）──────────────────────
      - name: Post - Manshuu Alert
        env:
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          IMAGE_FLAG=""
          if [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f manshuu.png ]; then
            IMAGE_FLAG="--with-image"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python x_post.py --type manshuu $IMAGE_FLAG $DRY_FLAG

      # ── 30秒待機 ────────────────────────────────────────
      - name: Wait between posts (2)
        run: sleep 30

      # ── 激走モーター 投稿 ────────────────────────────────
      - name: Post - Hot Motor
        env:
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          IMAGE_FLAG=""
          if [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f hot_motor.png ]; then
            IMAGE_FLAG="--with-image"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python x_post.py --type hot $IMAGE_FLAG $DRY_FLAG

      # ── 30秒待機 ────────────────────────────────────────
      - name: Wait between posts (3)
        run: sleep 30

      # ── 覚醒モーター 投稿 ────────────────────────────────
      - name: Post - Awakening Motor
        env:
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          IMAGE_FLAG=""
          if [ "${{ github.event.inputs.with_image }}" != "false" ] && [ -f awakening.png ]; then
            IMAGE_FLAG="--with-image"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python x_post.py --type awakening $IMAGE_FLAG $DRY_FLAG

      # ── motor_history.csv をリポジトリに保存 ────────────
      - name: Commit motor history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add motor_history.csv ranking_cache.json || true
          git diff --cached --quiet || git commit -m "auto: update motor_history $(date +%Y%m%d)"
          git push origin main || echo "⚠️ push 失敗（競合の可能性）"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
