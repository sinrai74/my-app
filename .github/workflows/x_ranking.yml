name: X Ranking Post

on:
  schedule:
    - cron: '0 23 * * *'    # JST 08:00 毎朝
  workflow_dispatch:        # 手動実行
    inputs:
      date:
        description: '対象日 YYYYMMDD（省略時は今日）'
        required: false
        default: ''
      dry_run:
        description: 'ドライラン（true=メール送信しない）'
        required: false
        default: 'false'
      with_image:
        description: '画像添付（true/false）'
        required: false
        default: 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── リポジトリ取得 ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python セットアップ ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 日本語フォントインストール（画像生成用）──────────
      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null 2>&1

      # ── 依存パッケージインストール ──────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 Pillow scikit-learn pandas numpy

      # ── モデルファイル確認 ──────────────────────────────
      - name: Check model file
        run: |
          if [ -f model_all.pkl ]; then
            echo "✅ model_all.pkl が存在します"
          else
            echo "⚠️  model_all.pkl が見つかりません（MLスコアなし）"
          fi

      # ── 前日のモーター履歴を蓄積 ────────────────────────
      - name: Update motor history (yesterday)
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            PREV_DATE=$(python3 -c 'from datetime import datetime, timedelta; d="${{ github.event.inputs.date }}"; print((datetime.strptime(d, "%Y%m%d") - timedelta(days=1)).strftime("%Y%m%d"))')
            DATE_ARG="--date $PREV_DATE"
          fi
          python x_ranking.py --update-history $DATE_ARG || echo "⚠️ 履歴更新失敗（続行）"

      # ── ランキング生成 ────────────────────────────────────
      - name: Generate rankings
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python x_ranking.py --generate $DATE_ARG

      # ── 画像生成 ──────────────────────────────────────────
      - name: Generate images
        if: ${{ github.event.inputs.with_image != 'false' }}
        run: |
          python x_image.py --all --input ranking_cache.json || echo "⚠️ 画像生成失敗（テキストのみ送信）"

      # ── Gmail でランキングを送信 ──────────────────────────
      - name: Send ranking email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          IMAGE_FLAG=""
          if [ "${{ github.event.inputs.with_image }}" != "false" ]; then
            IMAGE_FLAG="--with-image"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python x_post.py $IMAGE_FLAG $DRY_FLAG

      # ── motor_history.csv をリポジトリに保存 ────────────
      - name: Commit motor history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add motor_history.csv ranking_cache.json || true
          git diff --cached --quiet || git commit -m "auto: update motor_history $(date +%Y%m%d)"
          git push origin main || echo "⚠️ push 失敗（競合の可能性）"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
