name: ボートレース荒れ検知 (15分ごと)

on:
  schedule:
    - cron: "0,15,30,45 23 * * *"
    - cron: "0,15,30,45 0-12 * * *"
    - cron: "0 13 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      race_date:
        description: "対象日付 YYYYMMDD（空欄で今日）"
        required: false
        default: ""
      threshold:
        description: "荒れスコア閾値（デフォルト: 1.5）"
        required: false
        default: "1.5"

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run upset detector
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          DATE_ARG=""
          THRESHOLD_ARG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.race_date }}" ]; then
              DATE_ARG="--date ${{ github.event.inputs.race_date }}"
            fi
            if [ -n "${{ github.event.inputs.threshold }}" ]; then
              THRESHOLD_ARG="--threshold ${{ github.event.inputs.threshold }}"
            fi
          fi
          python notify_arashi.py $DATE_ARG $THRESHOLD_ARG

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
