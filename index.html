<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>競艇AI予想</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  max-width: 700px;
  margin: auto;
}
h2 { margin-bottom: 10px; }
.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}
input {
  width: 100%;
  padding: 6px;
  margin: 3px 0;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-top: 10px;
}
</style>

</head>

<body>

<h2>🚤 競艇AI予想</h2>

<div class="card">
  <h3>6艇データ入力</h3>
  <div id="boats"></div>

<label>資金（円）</label> <input id="bankroll" type="number" value="10000">

<button onclick="predict()">予想する</button>

</div>

<div class="card">
  <h3>結果</h3>
  <div id="result">ここに表示</div>
</div>

<script>

// 6艇入力フォーム生成
for (let i = 1; i <= 6; i++) {
  document.getElementById("boats").innerHTML += `
  <div class="card">
    <b>${i}号艇</b>
    <input placeholder="展示タイム (例:0.15)" id="ex${i}">
    <input placeholder="モーター (%)" id="motor${i}">
    <input placeholder="勝率" id="win${i}">
    <input placeholder="スタート (例:0.15)" id="start${i}">
  </div>`;
}

// 送信
function predict() {
  const boats = [];

  for (let i = 1; i <= 6; i++) {
    boats.push({
      lane: i,
      ex_time: parseFloat(document.getElementById("ex"+i).value),
      motor: parseFloat(document.getElementById("motor"+i).value),
      win_rate: parseFloat(document.getElementById("win"+i).value),
      start: parseFloat(document.getElementById("start"+i).value)
    });
  }

  fetch("/predict", {
  method: "POST",
  headers: {"Content-Type": "application/json"},
  body: JSON.stringify({
    bankroll: parseFloat(document.getElementById("bankroll").value),
    boats: boats,
    odds: {
      "1-2-3": 10,
      "1-2-4": 15,
      "1-3-2": 20,
      "1-3-4": 25,
      "1-4-2": 30,
      "1-4-3": 35,
      "2-1-3": 40
    }
  })
})

  .then(res => res.json())
  .then(data => {
    if (data.error) {
      document.getElementById("result").innerHTML = "エラー: " + data.error;
      return;
    }

    let html = "<b>買い目（おすすめ）</b><br>";

    data.buy.forEach(p => {
      html += `${p.combo} / EV:${p.ev} / ${p.verdict} / ${p.bet}円<br>`;
    });

    html += "<hr><b>全候補</b><br>";

    data.all.slice(0,10).forEach(p => {
      html += `${p.combo} / EV:${p.ev}<br>`;
    });

    document.getElementById("result").innerHTML = html;
  })
  .catch(e => {
    document.getElementById("result").innerHTML = "通信エラー: " + e;
  });
}

</script>

</body>
</html>
