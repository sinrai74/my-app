<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>競艇AI予想</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f4f8;color:#222;padding:16px;max-width:960px;margin:auto}
h1{font-size:1.4rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* タブ */
.tabs{display:flex;gap:4px;margin-bottom:14px}
.tab{padding:8px 18px;border-radius:7px 7px 0 0;border:1px solid #dde3ea;border-bottom:none;background:#e8edf2;cursor:pointer;font-size:0.9rem;font-weight:600}
.tab.active{background:#fff;color:#1a6ef5;border-bottom:1px solid #fff;margin-bottom:-1px}
.tab-content{display:none}
.tab-content.active{display:block}

/* カード */
.card{background:#fff;border:1px solid #dde3ea;border-radius:0 10px 10px 10px;padding:14px 16px;margin-bottom:14px}
.card h3{font-size:0.92rem;color:#555;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:6px}

/* グリッド */
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.grid-3 label{font-size:0.78rem;color:#555;display:block;margin-bottom:3px}
.grid-3 select,.grid-3 input[type="date"],.grid-3 input[type="number"],.grid-3 input[type="text"]{width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:0.88rem}

/* 艇グリッド */
.boats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:12px}
.boat-card{background:#f7f9fc;border:1px solid #dde3ea;border-radius:8px;padding:10px 12px}
.boat-label{font-weight:700;font-size:0.9rem;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.boat-num{display:inline-block;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:0.8rem;color:#fff;font-weight:700}
.c1{background:#fff;color:#222;border:1px solid #999}.c2{background:#111}.c3{background:#e00}.c4{background:#006be6}.c5{background:#f0c800;color:#222}.c6{background:#008a00}
.boat-card label{font-size:0.75rem;color:#666;display:block;margin-top:4px}
.boat-card input{width:100%;padding:5px 8px;margin:2px 0;border:1px solid #ccc;border-radius:5px;font-size:0.85rem}
.boat-card input.filled{border-color:#2e7d32;background:#f0fff0}
.boat-card input.error{border-color:#e00;background:#fff5f5}

/* ボタン */
.btn{width:100%;padding:9px;font-size:0.95rem;font-weight:700;border:none;border-radius:7px;cursor:pointer;margin-top:8px}
.btn-green{background:#2e7d32;color:#fff}.btn-green:hover{background:#1b5e20}
.btn-blue{background:#1a6ef5;color:#fff}.btn-blue:hover{background:#0d54c7}
.btn-red{background:#c00;color:#fff}.btn-red:hover{background:#900}
.btn:disabled{background:#aaa;cursor:not-allowed}

/* バナー */
.banner{padding:8px 12px;border-radius:6px;font-size:0.85rem;margin-top:8px;display:none}
.banner-ok{background:#d4edda;color:#155724}
.banner-warn{background:#fff3cd;color:#856404}
.banner-err{background:#f8d7da;color:#721c24}

/* 気象 */
.weather-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.weather-row>div{flex:1;min-width:110px}
.weather-row label{font-size:0.78rem;color:#555;display:block;margin-bottom:3px}
.weather-row select,.weather-row input{width:100%;padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:0.85rem}

/* ローディング */
#loading{display:none;text-align:center;padding:20px;color:#666;font-size:0.9rem}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid #ddd;border-top-color:#1a6ef5;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 予想結果 */
.result-banner{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:0.85rem;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.rb-blue{background:#eef4ff;border:1px solid #c5d0e8}
.ev-badge{padding:3px 10px;border-radius:20px;font-weight:700;font-size:0.82rem}
.ev-buy{background:#d4edda;color:#155724}
.ev-warn{background:#fff3cd;color:#856404}
.ev-skip{background:#f0f0f0;color:#888}

/* 艇別予測テーブル */
table.pred{width:100%;border-collapse:collapse;font-size:0.84rem}
table.pred th{background:#1a3a6e;color:#fff;padding:7px 8px;text-align:center}
table.pred td{padding:6px 8px;text-align:center;border-bottom:1px solid #eee}
table.pred tr.rank1 td{background:#fff9e6;font-weight:700}
table.pred tr.rank2 td{background:#f5f8ff}
table.pred tr:hover td{background:#f0f4ff}
.win-bar-wrap{width:80px;background:#eee;border-radius:4px;height:8px;display:inline-block;vertical-align:middle;margin-left:6px}
.win-bar{height:8px;border-radius:4px;background:#1a6ef5}
.flag-badge{font-size:0.75rem;padding:1px 6px;border-radius:4px;margin:1px}
.f-collapse{background:#ffe0e0;color:#c00}
.f-value{background:#fff8d0;color:#856404}
.f-under{background:#d0f0ff;color:#0060a0}
.f-st{background:#d4edda;color:#155724}

/* 買い目カード */
.picks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:8px}
.pick-card{border-radius:8px;padding:12px 14px;border:2px solid #dde3ea}
.pick-buy{border-color:#2e7d32;background:#f0fff4}
.pick-warn{border-color:#d47000;background:#fffdf0}
.pick-skip{border-color:#ccc;background:#fafafa;opacity:0.7}
.pick-title{font-weight:700;font-size:0.95rem;margin-bottom:6px}
.pick-axis{font-size:0.88rem;margin-bottom:4px}
.pick-combos{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.combo-chip{background:#1a3a6e;color:#fff;padding:3px 8px;border-radius:4px;font-size:0.8rem;font-family:monospace;font-weight:700}
.pick-notes{font-size:0.78rem;color:#888;margin-top:4px}
.pick-bet{font-size:0.85rem;color:#2e7d32;font-weight:700;margin-top:4px}
.pick-ev{font-size:0.8rem;color:#555}

/* 記録タブ */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.rec-grid label{font-size:0.78rem;color:#555;display:block;margin-bottom:3px}
.rec-grid input,.rec-grid select{width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:0.88rem}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-row .btn{flex:1}
table.hist{width:100%;border-collapse:collapse;font-size:0.82rem}
table.hist th{background:#374151;color:#fff;padding:6px 8px;text-align:center}
table.hist td{padding:5px 8px;text-align:center;border-bottom:1px solid #eee}
.hit-row td{background:#f0fff4!important}
.miss-row td{background:#fff5f5!important}
.del-btn{background:none;border:none;color:#aaa;cursor:pointer;font-size:0.85rem}
.del-btn:hover{color:#c00}

/* 統計タブ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border:1px solid #dde3ea;border-radius:8px;padding:12px;text-align:center}
.stat-card .label{font-size:0.75rem;color:#888;margin-bottom:4px}
.stat-card .value{font-size:1.5rem;font-weight:700}
.pos{color:#0a8c2a}.neg{color:#c00}.neu{color:#1a6ef5}
.venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.venue-card{padding:10px 12px;border-radius:8px;border:1px solid #dde3ea;background:#fff;font-size:0.82rem}
.venue-card .vname{font-weight:700;margin-bottom:4px}
.venue-card .vroi{font-size:1.1rem;font-weight:700}
.error-msg{color:#c00;background:#fff5f5;border:1px solid #f5c0c0;border-radius:6px;padding:10px 14px;font-size:0.88rem}

/* オッズ入力テーブル */
.odds-section{margin-top:4px}
.odds-note{font-size:0.8rem;color:#666;margin-bottom:8px;padding:6px 10px;background:#fffde7;border-radius:5px;border-left:3px solid #f9a825}
.odds-wrap{overflow-x:auto}
table.odds-tbl{border-collapse:collapse;font-size:0.82rem;min-width:480px;width:100%}
table.odds-tbl th{background:#1a3a6e;color:#fff;padding:5px 6px;text-align:center;white-space:nowrap}
table.odds-tbl td{padding:2px 3px;text-align:center;border:1px solid #e0e5ea}
table.odds-tbl td.empty{background:#f0f0f0;color:#ccc}
table.odds-tbl input{width:58px;padding:3px 4px;border:1px solid #ccc;border-radius:4px;font-size:0.8rem;text-align:center}
table.odds-tbl input.has-val{border-color:#2e7d32;background:#f0fff0;font-weight:700}
.odds-count{font-size:0.8rem;color:#888;margin-top:4px}
.btn-recalc{background:#7b2d8b;color:#fff;border:none;padding:9px 20px;border-radius:7px;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
.btn-recalc:hover{background:#5a1f68}
/* 実オッズ反映後の強調 */
.ev-real{color:#0a8c2a;font-weight:700}
.ev-est{color:#888}
</style>
</head>
<body>
<h1>🚤 競艇AI予想</h1>

<div class="tabs">
  <div class="tab active" onclick="switchTab('predict')">🎯 予想</div>
  <div class="tab" onclick="switchTab('record')">📝 結果記録</div>
  <div class="tab" onclick="switchTab('stats')">📊 回収率</div>
</div>

<!-- ══ タブ①: 予想 ══ -->
<div id="tab-predict" class="tab-content active">

  <!-- レース情報 -->
  <div class="card">
    <h3>📍 レース情報</h3>
    <div class="grid-3">
      <div><label>開催日</label><input type="date" id="race_date"></div>
      <div><label>場名</label>
        <select id="venue_name">
          <option value="">選択</option>
          <option>桐生</option><option>江戸川</option><option>戸田</option>
          <option>平和島</option><option>多摩川</option><option>浜名湖</option>
          <option>蒲郡</option><option>常滑</option><option>津</option>
          <option>三国</option><option>びわこ</option><option>住之江</option>
          <option>尼崎</option><option>鳴門</option><option>丸亀</option>
          <option>児島</option><option>宮島</option><option>徳山</option>
          <option>下関</option><option>若松</option><option>芦屋</option>
          <option>福岡</option><option>唐津</option><option>大村</option>
        </select>
      </div>
      <div><label>レース番号</label>
        <select id="race_no">
          <option value="1">1R</option><option value="2">2R</option><option value="3">3R</option>
          <option value="4">4R</option><option value="5">5R</option><option value="6">6R</option>
          <option value="7">7R</option><option value="8">8R</option><option value="9">9R</option>
          <option value="10">10R</option><option value="11">11R</option><option value="12">12R</option>
        </select>
      </div>
    </div>
    <button class="btn btn-green" id="btnFetch" onclick="fetchBoats()">🔄 出走表を自動取得</button>
    <div id="fetchBanner" class="banner"></div>
  </div>

  <!-- 6艇データ -->
  <div class="card">
    <h3>🚤 6艇データ <span style="font-size:0.8rem;color:#888">（自動取得後、展示タイムのみ入力）</span></h3>
    <div class="boats-grid" id="boatsGrid"></div>

    <!-- 気象設定 -->
    <details style="margin-top:4px">
      <summary style="font-size:0.82rem;color:#888;cursor:pointer">🌬 気象設定（オプション）</summary>
      <div class="weather-row">
        <div><label>風速 (m/s)</label><input type="number" id="wind_speed" value="0" min="0" max="20" step="0.5"></div>
        <div><label>風向</label>
          <select id="wind_dir">
            <option value="">なし</option><option value="追">追い風</option>
            <option value="向">向かい風</option><option value="横">横風</option>
          </select>
        </div>
        <div><label>潮位</label>
          <select id="tide">
            <option value="">なし</option><option value="干">干潮</option><option value="満">満潮</option>
          </select>
        </div>
        <div><label>資金（円）</label><input type="number" id="bankroll" value="10000" min="100" step="100"></div>
        <div><label>波高 (cm)</label><input type="number" id="wave_height_input" value="0" min="0" max="200" step="1"></div>
      </div>
      <div style="margin-top:6px;font-size:0.82rem;color:#555;display:flex;gap:16px">
        <span id="weather_disp"></span>
        <span id="wave_height_disp"></span>
      </div>
    </details>

    <button class="btn btn-blue" id="btnPredict" onclick="predict()" style="margin-top:12px">🤖 高精度AIで予想する</button>
  </div>

  <div id="loading"><span class="spinner"></span>AIが計算中…</div>

  <!-- 結果 -->
  <div id="result"><div class="card"><span style="color:#aaa;font-size:0.88rem">「AIで予想する」を押してください</span></div></div>
</div>

<!-- ══ タブ②: 結果記録 ══ -->
<div id="tab-record" class="tab-content">
  <div class="card">
    <h3>📝 結果を記録する</h3>
    <div class="rec-grid">
      <div><label>開催日</label><input type="date" id="rec_date"></div>
      <div><label>場名</label>
        <select id="rec_venue">
          <option value="">選択</option>
          <option>桐生</option><option>江戸川</option><option>戸田</option>
          <option>平和島</option><option>多摩川</option><option>浜名湖</option>
          <option>蒲郡</option><option>常滑</option><option>津</option>
          <option>三国</option><option>びわこ</option><option>住之江</option>
          <option>尼崎</option><option>鳴門</option><option>丸亀</option>
          <option>児島</option><option>宮島</option><option>徳山</option>
          <option>下関</option><option>若松</option><option>芦屋</option>
          <option>福岡</option><option>唐津</option><option>大村</option>
        </select>
      </div>
      <div><label>R番号</label>
        <select id="rec_race">
          <option value="1">1R</option><option value="2">2R</option><option value="3">3R</option>
          <option value="4">4R</option><option value="5">5R</option><option value="6">6R</option>
          <option value="7">7R</option><option value="8">8R</option><option value="9">9R</option>
          <option value="10">10R</option><option value="11">11R</option><option value="12">12R</option>
        </select>
      </div>
      <div><label>組番（例: 1-2-3）</label><input type="text" id="rec_combo" placeholder="1-2-3"></div>
      <div><label>ベット額（円）</label><input type="number" id="rec_bet" value="1000" min="100" step="100"></div>
      <div><label>オッズ</label><input type="number" id="rec_odds" step="0.1" placeholder="35.9"></div>
      <div><label>EV</label><input type="number" id="rec_ev" step="0.001" placeholder="1.23"></div>
    </div>
    <div style="margin-top:8px">
      <label style="font-size:0.78rem;color:#555">払戻額（的中時のみ）</label>
      <input type="number" id="rec_return" placeholder="例: 35900" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:5px;margin-top:3px">
    </div>
    <div style="margin-top:8px">
      <label style="font-size:0.78rem;color:#555">メモ</label>
      <input type="text" id="rec_memo" placeholder="任意" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:5px;margin-top:3px">
    </div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="submitRecord(true)">✅ 的中で記録</button>
      <button class="btn btn-red"   onclick="submitRecord(false)">❌ 外れで記録</button>
    </div>
    <div id="recBanner" class="banner" style="margin-top:8px"></div>
  </div>
  <div class="card">
    <h3>📋 記録履歴</h3>
    <div id="historyTable"><span style="color:#aaa">読み込み中…</span></div>
  </div>
</div>

<!-- ══ タブ③: 回収率 ══ -->
<div id="tab-stats" class="tab-content">
  <div id="statsGrid" class="stats-grid"></div>
  <div class="card"><h3>🏟 場別回収率</h3><div id="venueStats" class="venue-grid"></div></div>
  <div class="card"><h3>📅 月別回収率</h3><div id="monthTable"></div></div>
</div>

<script>
const LANE_CLS = ["c1","c2","c3","c4","c5","c6"];
let lastMeta = {};

// 今日の日付セット
(function(){
  const d=new Date();
  const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById("race_date").value=s;
  document.getElementById("rec_date").value=s;
})();

// タブ切替
function switchTab(name){
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active",["predict","record","stats"][i]===name);
  });
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById(`tab-${name}`).classList.add("active");
  if(name==="record") loadHistory();
  if(name==="stats")  loadStats();
}

// 艇フォーム生成
(function(){
  const g=document.getElementById("boatsGrid");
  for(let i=1;i<=6;i++){
    const d=document.createElement("div");
    d.className="boat-card";
    d.innerHTML=`
      <div class="boat-label">
        <span class="boat-num ${LANE_CLS[i-1]}">${i}</span>
        <span id="bname_${i}">${i}号艇</span>
      </div>
      <label>展示タイム <span style="color:#e00">*</span></label>
      <input type="number" step="0.01" min="6.4" max="7.3" id="ex${i}" placeholder="6.70">
      <label>全国勝率</label>
      <input type="number" step="0.01" id="win${i}" placeholder="5.50">
      <label>モーター2率(%)</label>
      <input type="number" step="0.1"  id="motor${i}" placeholder="35.0">
      <label>平均ST</label>
      <input type="number" step="0.01" id="start${i}" placeholder="0.18">
      <label>当地勝率</label>
      <input type="number" step="0.01" id="local${i}" placeholder="0.00">
    `;
    g.appendChild(d);
  }
})();

function showBanner(id,msg,type){
  const el=document.getElementById(id);
  el.textContent=msg; el.className=`banner banner-${type}`; el.style.display="block";
}

// 出走表取得
async function fetchBoats(){
  const dt=document.getElementById("race_date").value.replace(/-/g,"");
  const vn=document.getElementById("venue_name").value;
  const rn=document.getElementById("race_no").value;
  if(!vn){showBanner("fetchBanner","⚠️ 場名を選択してください","warn");return;}
  document.getElementById("btnFetch").disabled=true;
  showBanner("fetchBanner","🔄 取得中…","ok");
  try{
    const res=await fetch(`/boats?date=${dt}&venue=${encodeURIComponent(vn)}&race=${rn}`);
    const data=await res.json();
    if(res.status===202&&data.boats){fillBoats(data.boats);showBanner("fetchBanner","✅ 取得完了。展示タイムを入力してください","ok");}
    else if(!res.ok) showBanner("fetchBanner",
      `❌ ${data.error||"取得失敗"}${data.hint?' / '+data.hint:''}${data.trace?'<br><small>'+data.trace.slice(0,200)+'</small>':''}`,
      "err");
    else{
      fillBoats(data.boats);
      // 気象情報を自動反映
      if(data.weather){
        const w = data.weather;
        if(w.wind_speed  != null) document.getElementById("wind_speed").value = w.wind_speed;
        if(w.wind_direction)      document.getElementById("wind_dir").value   = w.wind_direction;
        if(w.wave_height != null) document.getElementById("wave_height_disp").textContent =
          `🌊 波高: ${w.wave_height}cm`;
        if(w.weather)             document.getElementById("weather_disp").textContent =
          `🌤 天候: ${w.weather}`;
      }
      const exCount = data.boats.filter(b=>b.ex_st!=null).length;
      showBanner("fetchBanner",
        `✅ ${vn} ${rn}R 取得完了 / 展示ST: ${exCount}艇`,"ok");
    }
  }catch(e){showBanner("fetchBanner",`🔌 通信エラー: ${e}`,"err");}
  finally{document.getElementById("btnFetch").disabled=false;}
}

function fillBoats(boats){
  boats.forEach(b=>{
    const i=b.lane;
    const nm=document.getElementById(`bname_${i}`);
    if(nm) nm.textContent=`${i}号艇 ${b.name||""}`;
    const set=(id,v)=>{const el=document.getElementById(id);if(el&&v!=null){el.value=v;el.classList.add("filled");}};
    document.getElementById(`ex${i}`).value=""; document.getElementById(`ex${i}`).classList.remove("filled");
    set(`win${i}`,   b.win_rate);
    set(`motor${i}`, b.motor);
    set(`start${i}`, b.start);
    set(`local${i}`, b.local_win);
    // 展示ST（取得済みなら boats オブジェクトに格納しておく）
    if(b.ex_st != null) window[`_ex_st_${i}`] = b.ex_st;
  });
}

function validateBoats(){
  let ok=true;
  for(let i=1;i<=6;i++){
    const el=document.getElementById(`ex${i}`);
    el.classList.remove("error");
    if(isNaN(parseFloat(el.value))){el.classList.add("error");ok=false;}
  }
  return ok;
}

// 予想実行
async function predict(){
  if(!validateBoats()){
    document.getElementById("result").innerHTML=`<div class="card"><div class="error-msg">⚠️ 展示タイムをすべて入力してください</div></div>`;
    return;
  }
  const boats=[];
  for(let i=1;i<=6;i++){
    boats.push({
      lane:      i,
      ex_time:   parseFloat(document.getElementById(`ex${i}`).value),
      ex_st:     window[`_ex_st_${i}`] ?? null,  // 展示ST（自動取得）
      win_rate:  parseFloat(document.getElementById(`win${i}`).value)||5.0,
      motor:     parseFloat(document.getElementById(`motor${i}`).value)||35.0,
      start:     parseFloat(document.getElementById(`start${i}`).value)||0.18,
      local_win: parseFloat(document.getElementById(`local${i}`).value)||0.0,
      name:      document.getElementById(`bname_${i}`).textContent.replace(`${i}号艇 `,""),
    });
  }
  const raceDate=document.getElementById("race_date").value.replace(/-/g,"");
  const venue   =document.getElementById("venue_name").value;
  const raceNo  =parseInt(document.getElementById("race_no").value);
  const bankroll=parseFloat(document.getElementById("bankroll").value)||10000;
  const ws      =parseFloat(document.getElementById("wind_speed").value)||0;
  const wd      =document.getElementById("wind_dir").value;
  const tide    =document.getElementById("tide").value;
  const waveH   =parseInt(document.getElementById("wave_height_input")?.value)||0;

  lastMeta={raceDate,venue,raceNo,bankroll};

  document.getElementById("loading").style.display="block";
  document.getElementById("result").innerHTML="";
  document.getElementById("btnPredict").disabled=true;

  try{
    const res=await fetch("/predict_ml",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
          boats, race_date:raceDate, venue_name:venue, race_no:raceNo,
          bankroll, wind_speed:ws, wind_direction:wd, tide_level:tide,
          wave_height:waveH,
        })});
    const data=await res.json();
    if(data.error){
      document.getElementById("result").innerHTML=`<div class="card"><div class="error-msg">⚠️ ${data.error}<br><small>${data.trace||""}</small></div></div>`;
      return;
    }
    renderResult(data);
  }catch(e){
    document.getElementById("result").innerHTML=`<div class="card"><div class="error-msg">🔌 通信エラー: ${e}</div></div>`;
  }finally{
    document.getElementById("loading").style.display="none";
    document.getElementById("btnPredict").disabled=false;
  }
}

// ── 買い目から必要な3連単組番を最大10件抽出してオッズ入力欄を生成 ──
function buildOddsSection(data){
  // 買い推奨の組番を収集（全ピックの3連単comboから）
  const combos = [];
  data.picks.forEach(p => {
    if(p.verdict && !p.verdict.includes("❌")){
      (p.combos||[]).forEach(c => { if(c && !combos.includes(c)) combos.push(c); });
    }
  });
  // 最大10件に絞る（EVが高い順＝picksの順番通り）
  const top = combos.slice(0, 10);
  if(top.length === 0) return "";  // 買い目なし時は表示しない

  let rows = top.map(combo => `
    <tr>
      <td style="font-family:monospace;font-weight:700;font-size:0.88rem;padding:5px 8px">${combo}</td>
      <td style="padding:3px 6px">
        <input type="number" step="0.1" min="1" id="odds_${combo.replace(/-/g,'_')}"
          placeholder="例: 35.9"
          oninput="this.classList.toggle('has-val', this.value!==''); updateOddsCount()">
      </td>
    </tr>`).join("");

  return `
  <div class="card" id="oddsCard">
    <h3>📊 実オッズ入力
      <span style="font-size:0.8rem;color:#888">（買い推奨の組番のみ・最大10件）</span>
    </h3>
    <div class="odds-note">
      💡 <a href="https://sp.macour.jp/" target="_blank" style="color:#1a6ef5">マクール</a>
      等で3連単オッズを確認しながら入力してください。入力後「オッズ反映」を押すとEVが正確になります。
    </div>
    <table style="border-collapse:collapse;width:100%;max-width:320px">
      <thead>
        <tr>
          <th style="background:#1a3a6e;color:#fff;padding:6px 8px;text-align:left;font-size:0.82rem">組番</th>
          <th style="background:#1a3a6e;color:#fff;padding:6px 8px;text-align:center;font-size:0.82rem">3連単オッズ</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="odds-count" id="oddsCount" style="font-size:0.8rem;color:#888;margin-top:6px">
      0件入力済み / ${top.length}件
    </div>
    <button class="btn-recalc" onclick="applyOdds()">🔄 オッズ反映して再計算</button>
  </div>`;
}

function updateOddsCount(){
  const data = window._lastPredData;
  if(!data) return;
  const combos = [];
  data.picks.forEach(p => { (p.combos||[]).forEach(c => { if(c && !combos.includes(c)) combos.push(c); }); });
  const top = combos.slice(0,10);
  let cnt = 0;
  top.forEach(c => {
    const el = document.getElementById("odds_"+c.replace(/-/g,"_"));
    if(el && el.value !== "") cnt++;
  });
  const el = document.getElementById("oddsCount");
  if(el) el.textContent = `${cnt}件入力済み / ${top.length}件`;
}

function round3(v){ return Math.round(v*1000)/1000; }

// ── オッズ反映して買い目・EV・Kelly推奨額を再計算 ──────────────
function applyOdds(){
  const data = window._lastPredData;
  if(!data){ alert("先に予想を実行してください"); return; }

  // 入力されたオッズを収集
  const oddsMap = {};  // {"1-2-3": 35.9, ...}
  const combos = [];
  data.picks.forEach(p => { (p.combos||[]).forEach(c => { if(c && !combos.includes(c)) combos.push(c); }); });
  combos.slice(0,10).forEach(c => {
    const el = document.getElementById("odds_"+c.replace(/-/g,"_"));
    if(el && el.value !== "") oddsMap[c] = parseFloat(el.value);
  });

  if(Object.keys(oddsMap).length === 0){
    alert("少なくとも1件のオッズを入力してください");
    return;
  }

  const dynEV   = data.dynamic_ev_min || 1.5;
  const bankroll = parseFloat(document.getElementById("bankroll").value) || 10000;

  // 買い目カードを再描画（オッズ反映版）
  let picksHtml = `<div class="card"><h3>🎯 買い目（実オッズ反映済み）</h3><div class="picks-grid">`;
  data.picks.forEach(p => {
    // オッズ入力済みcomboから最良EVを計算
    let bestEv = p.axis_ev || 0;
    let bestCombo = "";
    let bestOdds = 0;
    (p.combos||[]).forEach(c => {
      if(oddsMap[c]){
        const ev = (p.axis_prob||0) * oddsMap[c];
        if(ev > bestEv){ bestEv = round3(ev); bestCombo = c; bestOdds = oddsMap[c]; }
      }
    });

    // Kelly推奨総額を再計算（1点あたりに分割）
    let totalBet = 0;
    const ticketCnt = p.ticket_count || 1;
    if(bestOdds > 0 && (p.axis_prob||0) > 0){
      const b = bestOdds - 1;
      const kFull = b > 0 ? (b*(p.axis_prob) - (1-(p.axis_prob))) / b : 0;
      const kAdj  = Math.max(0, kFull) * 0.5;
      totalBet = Math.floor(Math.min(bankroll * kAdj, bankroll * 0.1) / 100) * 100;
    }
    const perTicket = Math.max(Math.floor(totalBet / ticketCnt / 100) * 100, 100);

    const isRealOdds = bestCombo !== "";
    const evColor = bestEv >= dynEV ? "#0a8c2a" : "#888";
    const verdict = bestEv >= dynEV*1.3 ? "✅ 強く買い" :
                    bestEv >= dynEV     ? "⚠️ 買い"     : p.verdict;
    const cls = verdict.includes("✅") ? "pick-buy" :
                verdict.includes("⚠️") ? "pick-warn" : "pick-skip";

    const laneBadge = (lane) =>
      `<span class="boat-num ${LANE_CLS[(lane||1)-1]}" style="width:20px;height:20px;line-height:20px;font-size:0.75rem">${lane||"−"}</span>`;

    const flowHtml = (p.flow_lanes||[]).map(l=>laneBadge(l)).join(" ");

    const combosHtml = (p.combos||[]).map(c => {
      const hasOdds = oddsMap[c];
      return `<span class="combo-chip" style="${hasOdds?'background:#7b2d8b':''}"
        title="${hasOdds?'オッズ:'+oddsMap[c]:''}">${c}${hasOdds?' ('+oddsMap[c]+')':''}</span>`;
    }).join("");

    const fmHtml = p.formation
      ? `<div style="font-size:1.05rem;font-weight:700;letter-spacing:1px;margin:6px 0;color:#1a3a6e">
          📋 ${p.formation}
          <span style="font-size:0.78rem;color:#888;font-weight:400;margin-left:6px">${ticketCnt}点</span>
         </div>` : "";

    const betHtml = totalBet > 0
      ? `<div class="pick-bet">💴 総額 ¥${totalBet.toLocaleString()}
           <span style="font-size:0.78rem;color:#555;font-weight:400">（1点 ¥${perTicket.toLocaleString()} × ${ticketCnt}点）</span>
         </div>` : "";

    picksHtml += `<div class="pick-card ${cls}">
      <div class="pick-title">${verdict}${isRealOdds?' <span style="font-size:0.75rem;background:#d4edda;color:#155724;padding:1px 6px;border-radius:10px">実オッズ</span>':""}</div>
      ${fmHtml}
      <div style="font-size:0.82rem;color:#555;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span>1着: ${laneBadge(p.axis_lane)} <b>${p.axis_name||""}</b></span>
        <span style="color:#ccc">|</span>
        <span>2着: ${laneBadge(p.place_lane)}</span>
        <span style="color:#ccc">|</span>
        <span>3着流し: ${flowHtml}</span>
      </div>
      <div class="pick-ev" style="color:${evColor};font-weight:${bestEv>=dynEV?'700':'400'}">
        確率: ${((p.axis_prob||0)*100).toFixed(1)}%
        / EV: ${bestEv.toFixed(2)}${isRealOdds?' ✓':'（推定）'}
        ${bestOdds>0?`/ オッズ: ${bestOdds}`:''}
      </div>
      ${betHtml}
      <div class="pick-combos" style="margin-top:6px">${combosHtml||"−"}</div>
      <div class="pick-notes">${p.notes||""}</div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn btn-green" style="padding:4px 10px;font-size:0.8rem;margin:0;width:auto"
          data-lane="${p.axis_lane||0}" data-ev="${bestEv}" data-bet="${totalBet||100}"
          onclick="quickRecordBtn(this,true)">✅ 的中</button>
        <button class="btn btn-red" style="padding:4px 10px;font-size:0.8rem;margin:0;width:auto"
          data-lane="${p.axis_lane||0}" data-ev="${bestEv}" data-bet="${totalBet||100}"
          onclick="quickRecordBtn(this,false)">❌ 外れ</button>
      </div>
    </div>`;
  });
  picksHtml += `</div></div>`;

  // 買い目カードを差し替え（オッズカードはそのまま残す）
  const resultDiv  = document.getElementById("result");
  const allCards   = resultDiv.querySelectorAll(".card");
  // 3枚目（買い目カード）を差し替え
  if(allCards.length >= 2){
    const picksCard = allCards[1];
    picksCard.outerHTML = picksHtml.replace('<div class="card">','').replace(/<\/div>$/, '');
    // 全体を再構築した方が安全
    const oddsCard = document.getElementById("oddsCard");
    const oddsHtml = oddsCard ? oddsCard.outerHTML : "";
    // AIスコアカードはそのまま残す
    const scoreCard = allCards[0];
    resultDiv.innerHTML = scoreCard.outerHTML + picksHtml + oddsHtml;
    // オッズ入力値を復元
    Object.entries(oddsMap).forEach(([c,v]) => {
      const el = document.getElementById("odds_"+c.replace(/-/g,"_"));
      if(el){ el.value=v; el.classList.add("has-val"); }
    });
    updateOddsCount();
  }
}

// 買い目から直接記録
// data-属性からパラメータを取得してrecordを呼ぶ（onclick内の変数埋め込みを避ける）
function quickRecordBtn(btn, hit){
  const lane = btn.getAttribute("data-lane");
  const ev   = parseFloat(btn.getAttribute("data-ev")) || 0;
  const bet  = parseInt(btn.getAttribute("data-bet"))  || 100;
  quickRecord(lane, ev, bet, hit);
}

async function quickRecord(lane, ev, bet, hit){
  const meta = lastMeta;
  if(!meta.raceDate){ alert("先に予想を実行してください"); return; }
  const defaultReturn = hit ? Math.round(bet * 10) : 0;
  const ra = hit
    ? (parseInt(prompt(`払戻額（円）を入力\n艇番: ${lane}`, defaultReturn)) || 0)
    : 0;
  const body = {
    race_date:     String(meta.raceDate),
    venue_name:    String(meta.venue || ""),
    race_no:       parseInt(meta.raceNo) || 1,
    combo:         String(lane),
    bet_amount:    parseInt(bet) || 100,
    hit:           Boolean(hit),
    return_amount: parseInt(ra) || 0,
    ev:            parseFloat(ev) || 0,
  };
  try{
    const res  = await fetch("/record", {
      method:  "POST",
      headers: {"Content-Type": "application/json"},
      body:    JSON.stringify(body),
    });
    if(!res.ok){
      const text = await res.text();
      alert("サーバーエラー: " + res.status + "\n" + text.slice(0,200));
      return;
    }
    const data = await res.json();
    if(data.status === "ok"){
      alert(`${hit ? "✅" : "❌"} 記録しました（累計 ${data.total} 件）`);
    } else {
      alert("記録失敗: " + (data.error || "不明"));
    }
  } catch(e) {
    alert("通信エラー: " + e);
  }
}

// 手動記録
async function submitRecord(hit){
  const body={
    race_date:document.getElementById("rec_date").value.replace(/-/g,""),
    venue_name:document.getElementById("rec_venue").value,
    race_no:parseInt(document.getElementById("rec_race").value),
    combo:document.getElementById("rec_combo").value.trim(),
    bet_amount:parseInt(document.getElementById("rec_bet").value)||0,
    hit,return_amount:hit?(parseInt(document.getElementById("rec_return").value)||0):0,
    odds:parseFloat(document.getElementById("rec_odds").value)||0,
    ev:parseFloat(document.getElementById("rec_ev").value)||0,
    memo:document.getElementById("rec_memo").value,
  };
  if(!body.venue_name||!body.combo){showBanner("recBanner","⚠️ 場名と組番は必須です","warn");return;}
  try{
    const res=await fetch("/record",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await res.json();
    if(data.status==="ok"){showBanner("recBanner",`${hit?"✅":"❌"}記録しました（累計${data.total}件）`,"ok");loadHistory();}
    else showBanner("recBanner","❌ 失敗: "+(data.error||"不明"),"err");
  }catch(e){showBanner("recBanner","🔌 通信エラー: "+e,"err");}
}

// 履歴
async function loadHistory(){
  try{
    const data=await(await fetch("/history?limit=50")).json();
    const rows=data.records||[];
    if(!rows.length){document.getElementById("historyTable").innerHTML="<span style='color:#aaa'>まだ記録がありません</span>";return;}
    let html=`<table class="hist"><tr><th>日付</th><th>場</th><th>R</th><th>組番</th><th>ベット</th><th>払戻</th><th>損益</th><th>EV</th><th>判定</th><th></th></tr>`;
    rows.forEach(r=>{
      const pc=r.profit>0?"color:#0a8c2a;font-weight:700":r.profit<0?"color:#c00":"";
      html+=`<tr class="${r.hit?"hit-row":"miss-row"}">
        <td>${r.race_date}</td><td>${r.venue_name}</td><td>${r.race_no}R</td>
        <td style="font-family:monospace;font-weight:700">${r.combo}</td>
        <td>¥${r.bet_amount.toLocaleString()}</td>
        <td>${r.hit?"¥"+r.return_amount.toLocaleString():"−"}</td>
        <td style="${pc}">${r.profit>=0?"+":""}¥${r.profit.toLocaleString()}</td>
        <td>${r.ev?r.ev.toFixed(3):"−"}</td>
        <td>${r.hit?"✅":"❌"}</td>
        <td><button class="del-btn" onclick="delRecord('${r.id}')">🗑</button></td>
      </tr>`;
    });
    document.getElementById("historyTable").innerHTML=html+"</table>";
  }catch(e){document.getElementById("historyTable").innerHTML=`<div class="error-msg">取得失敗: ${e}</div>`;}
}

async function delRecord(id){
  if(!confirm("削除しますか？"))return;
  const data=await(await fetch(`/record/${id}`,{method:"DELETE"})).json();
  if(data.status==="ok") loadHistory();
}

// 統計
async function loadStats(){
  try{
    const s=await(await fetch("/stats")).json();
    const rc=s.roi>=100?"pos":s.roi>=80?"neu":"neg";
    const pc=s.profit>=0?"pos":"neg";
    document.getElementById("statsGrid").innerHTML=`
      <div class="stat-card"><div class="label">総レース</div><div class="value neu">${s.total_races}</div></div>
      <div class="stat-card"><div class="label">的中数</div><div class="value neu">${s.hit_count}</div></div>
      <div class="stat-card"><div class="label">的中率</div><div class="value ${rc}">${s.hit_rate}%</div></div>
      <div class="stat-card"><div class="label">総投資</div><div class="value neu">¥${s.total_bet.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">総回収</div><div class="value neu">¥${s.total_return.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">回収率</div><div class="value ${rc}">${s.roi}%</div></div>
      <div class="stat-card"><div class="label">損益</div><div class="value ${pc}">${s.profit>=0?"+":""}¥${s.profit.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">連勝🔥</div><div class="value ${s.streak_win>0?"pos":"neu"}">${s.streak_win}</div></div>
      <div class="stat-card"><div class="label">連敗💧</div><div class="value ${s.streak_lose>0?"neg":"neu"}">${s.streak_lose}</div></div>
    `;
    const vs=Object.entries(s.by_venue||{}).sort((a,b)=>b[1].roi-a[1].roi);
    document.getElementById("venueStats").innerHTML=vs.length
      ?vs.map(([vn,v])=>`<div class="venue-card">
          <div class="vname">${vn}</div>
          <div class="vroi ${v.roi>=100?"pos":v.roi>=80?"neu":"neg"}">${v.roi}%</div>
          <div style="font-size:0.75rem;color:#888">${v.races}R / 的中${v.hits} / ¥${v.return.toLocaleString()}</div>
        </div>`).join("")
      :"<span style='color:#aaa'>データなし</span>";
    const ms=Object.entries(s.by_month||{}).sort((a,b)=>b[0].localeCompare(a[0]));
    if(ms.length){
      let t=`<table class="hist"><tr><th>月</th><th>R数</th><th>的中</th><th>投資</th><th>回収</th><th>回収率</th></tr>`;
      ms.forEach(([m,v])=>{
        const yr=m.slice(0,4),mo=m.slice(4,6);
        const rc2=v.roi>=100?"color:#0a8c2a;font-weight:700":v.roi>=80?"":"color:#c00";
        t+=`<tr><td>${yr}年${mo}月</td><td>${v.races}</td><td>${v.hits}</td><td>¥${v.bet.toLocaleString()}</td><td>¥${v.return.toLocaleString()}</td><td style="${rc2}">${v.roi}%</td></tr>`;
      });
      document.getElementById("monthTable").innerHTML=t+"</table>";
    }else{
      document.getElementById("monthTable").innerHTML="<span style='color:#aaa'>データなし</span>";
    }
  }catch(e){document.getElementById("statsGrid").innerHTML=`<div class="error-msg">取得失敗: ${e}</div>`;}
}
</script>
</body>
</html>
